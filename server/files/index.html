<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        h1 {
        font-family: Arial, sans-serif;
        font-size: 2.5rem;
        font-weight: bold;
         color: black;
        text-align: left top;
        margin: 20px 0px 40px 0px; /*oben - rechts - unten - links*/
        }
        body {
            display: block;
            justify-content: space-between;
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: lightblue;
            background-image:
                url('Studio_Ghibli_logo.png');
                background-repeat: no-repeat;
            background-position: right top;
            background-size: 500px auto;
        }

        /*.layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }*/

        .content {
            max-width: calc(100% - 500px);
        }



        ol {
            display: flex;
            flex-direction: column;
            gap: 4rem;
            padding: 0;
            list-style-type: none; /* sonst Zahlen dabei */
        }

        
        li {
            display: flex;
            align-items: flex-start;
            gap:  2rem;
            min-height: 330px;
         }
        
        
        .movie-poster {
            width: 220px;
            height: 330px;
            object-fit: cover;
            /*margin-bottom: 3.00rem;*/
        }

        .movie-text {
             display: flex;
             flex-direction: column;
             flex: 1;
        }
        
        .movie-text button {
            align-self: flex-start;
            margin-top: 1rem;
            }
        
    </style>

</head>

<body>
    
    <h1>LiLi's Favourite Studio Ghibli Movies</h1>

    <div class="content">
        <ol id="movie-list"></ol>

    </div>



    <script src="index.js"></script>

</body>

</html>
